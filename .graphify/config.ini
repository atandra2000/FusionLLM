# Graphify Cache Configuration
# This file is auto-generated and controls graphify caching behavior

[CACHE]
enabled = true
ttl = 3600
max_size = 100

[OPTIMIZATION]
prefer_local_ast = true
skip_semantic_extraction = true
batch_size = 100
max_workers = 4

[QUERY]
default_budget = 1000
max_nodes = 50
exclude_hubs = 90
use_cache = true

[EXTRACTION]
parallel = true
timeout = 300
dedup_llm = false

[LOGGING]
query_log = ~/.cache/graphify-queries.log
disable_query_log = false
log_responses = false
