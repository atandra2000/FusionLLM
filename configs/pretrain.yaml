# configs/pretrain.yaml
#
# The single canonical pre-training profile (v2).
#
# Hardware target: 1× / 8× NVIDIA A100 SXM 80GB on RunPod via **FSDP2**
# (`torch.distributed.fsdp.fully_shard`).  World size comes from
# `torchrun`; FSDP2 wraps the model when WORLD_SIZE > 1.
#
# Per-step tokens per rank:
#   micro_batch_size × gradient_accumulation_steps × max_seq_len
#   = 2 × 16 × 4096 = 131,072
#
# Total per-step tokens (world = 8):
#   131,072 × 8 = 1,048,576 ≈ 1 M tokens / opt-step
#
# At ≈ 4.0 M tokens / sec on the 5:1 hybrid MLA + GDN + fine-grained
# MoE + MTP stack → 150B tokens ≈ 10.4 hours wall-clock on a single 8×A100
# 80GB SXM node.

# ── Training loop ────────────────────────────────────────────────────────────
training:
  micro_batch_size: 2                # per-rank
  gradient_accumulation_steps: 16    # per-rank
  total_steps: 143_000               # 150B tokens / 1.05M tokens/step
  warmup_steps: 500

  lr: 3e-4                           # AdamW base LR (non-matrix params)
  muon_lr: 0.02                      # Muon LR (matrix params)
  muon_momentum: 0.95
  adamw_betas: [0.9, 0.95]
  min_lr_ratio: 0.1
  weight_decay: 0.1
  cautious_wd: true
  grad_clip: 1.0

  dtype: bf16
  use_checkpoint: true               # gradient checkpointing per block
  save_dir: checkpoints/pretrain
  save_interval: 500
  log_interval: 50

  # ── Eval during training (Phase 6.2) ───────────────────────────────
  # Perplexity on synthetic data (eval_synthetic: true) runs anywhere.
  # Set eval_synthetic: false to also run lm-eval-harness tasks via
  # `run_lm_eval.py` (requires lm_eval package + CUDA).
  eval_enabled: false
  eval_interval: 1000
  eval_max_batches: 8
  eval_synthetic: true
  eval_tasks: [hellaswag, arc_challenge, piqa, winogrande, boolq]

  # ── Curriculum (Phase 6.3) ─────────────────────────────────────────
  # Set curriculum_switch_step > 0 to enable the 2-stage SmolTalk-3
  # recipe.  Stage-1 weights default to web-heavy; stage-2 to
  # code/math-heavy.  Only takes effect when shard_manifest_path is set.
  curriculum_switch_step: 0          # 0 = disabled
  # curriculum_stage1_weights:       # uncomment to override defaults
  #   fineweb_edu: 0.70
  #   stack_edu: 0.15
  #   openr1_math: 0.05
  #   fineweb2: 0.10
  # curriculum_stage2_weights:
  #   fineweb_edu: 0.30
  #   stack_edu: 0.25
  #   openr1_math: 0.25
  #   fineweb2: 0.10
  #   smollm_corpus: 0.10

  balance_loss_alpha: 1e-4
  bias_update_speed: 1e-3
  bias_update_every: 10

  # ── FSDP2 ────────────────────────────────────────────────────────────
  fsdp_shard_strategy: FULL_SHARD    # FULL_SHARD | SHARD_GRAD_OP | NO_SHARD
  fsdp_forward_prefetch: false       # off (saves H2D bandwidth on hot path)
  fsdp_backward_prefetch: true       # on (PyTorch 2.4+ default)
  fsdp_limit_all_gathers: true       # cap NCCL queue depth
  fsdp_param_dtype: bf16             # bf16 | fp16 | fp32
  fsdp_reduce_dtype: fp32
  shard_keep_last: 1                 # Phase 3.2: keep last N FSDP units resident

  # ── Checkpoint backend (Phase 3.1) ───────────────────────────────────
  checkpoint_backend: safetensors    # safetensors (default) | dcp (opt-in)

  # ── Phase 4: Optimizer mode (Phase 6.1 defaults) ────────────────────
  optimizer: normuon_adamw           # normuon_adamw | muon_adamw
  scheduler: wsd                     # wsd | cosine
  wsd_warmup_frac: 0.01
  wsd_stable_frac: 0.84
  wsd_decay: linear                  # linear | cosine

  # ── Phase 4: Batch-size schedule ─────────────────────────────────────
  batch_size_schedule_enabled: false
  initial_batch_size: 2
  final_batch_size: 8
  batch_size_schedule_steps: 5000

  # ── Phase 4: Seq-len schedule ────────────────────────────────────────
  seq_len_schedule_enabled: false
  initial_seq_len: 2048
  final_seq_len: 8192
  seq_len_schedule_steps: 5000

  # ── Phase 4: Fused kernels (opt-out) ─────────────────────────────────
  fuse_ce_softcap: true
  fuse_linear_relu2: true

  # ── Logging ───────────────────────────────────────────────────────────
  wandb_enabled: true
  wandb_project: fusionllm-pretrain
  wandb_entity: null
  wandb_run_name: null
  wandb_tags: []

  mlflow_enabled: true
  mlflow_tracking_uri: file:./mlruns
  mlflow_experiment_name: fusionllm-pretrain
  mlflow_run_name: null
  mlflow_tags: {}

# ── Hardware ────────────────────────────────────────────────────────────────
hardware:
  device: cuda
  profile: a100_80gb_8x
  min_vram_gb: 70.0
  n_gpus: 8
  enable_tf32: true
  enable_bf16_reduced_precision: true
  cudnn_benchmark: true
  cudnn_deterministic: false
  num_workers: 8
  val_num_workers: 4
  prefetch_factor: 4
  empty_cache_every: 0
  async_checkpointing: true
  async_wandb: true
  async_mlflow: true
  use_mmap_data: true
  enable_nvlink_check: true

# ── Model ────────────────────────────────────────────────────────────────────
# Hybrid: 5 MLA blocks followed by 1 GDN block, repeated N× = n_layers.
#   • Attention layers use MLA with GQA-on-top (8 KV groups) + QK-norm
#     + optional sliding window (Gemma 2 5:1 local-global interleaving).
#   • Every 6th layer is a Gated Delta Net (GDN) — Qwen3-Next style;
#     legacy Mamba-2 is opt-in via `ssm_type: "mamba2"`.
#   • MLA layers carry a fine-grained DeepSeekMoE FFN:
#       64 routed experts, 6 active, 4 shared, group-limited routing
#       (n_groups=8, topk_groups=3), aux-loss-free biased sigmoid, SwiGLU.
#   • SSM (GDN) layers carry a small dense SwiGLU FFN.
#   • MTP depth = 3: three auxiliary heads predict tokens 1, 2, 3 ahead.
#   • Tied embed/head, no bias in any linear.
#
# Approx params: ~7 B total / ~2.5 B active.
# Memory on 8×A100 80GB SXM with FSDP2 FULL_SHARD + NorMuon/CautiousAdamW:
#   static state ≈ 4.5 GB/GPU; activations+KV cache fit comfortably.
model:
  vocab_size: 152064                 # Qwen2.5 BPE tokenizer
  max_seq_len: 4096
  dim: 2048
  n_layers: 30                       # 5 × (5 MLA + 1 GDN) = 30
  layer_schedule: "5:1"             # 5 MLA + 1 GDN (Phase 2 default)

  # ── MLA params ────────────────────────────────────────────────────────
  n_heads: 32
  n_kv_groups: 8                     # 8 KV heads shared by 4 Q heads each
  q_lora_rank: 512
  kv_lora_rank: 256
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  rope_theta: 10000.0
  rope_factor: 8.0
  qk_norm: true
  sliding_window: 2048               # local attention over the last 2K tokens
  sliding_window_schedule: "5:1"     # 5:1 local-global interleaving (Gemma 2)

  # ── Dense FFN dim (GDN layers) ────────────────────────────────────────
  inter_dim: 4096
  ffn_activation: swiglu             # swiglu (default), relu2 (legacy)

  # ── MoE FFN (MLA layers) — Phase 2.7 bump ────────────────────────────
  n_routed_experts: 64               # fine-grained (was 32)
  n_shared_experts: 4                # shared (was 2)
  n_activated_experts: 6             # (was 4)
  moe_inter_dim: 1536
  expert_capacity_factor: 1.5
  expert_dropout_prob: 0.1
  moe_warmup_steps: 2000
  n_expert_groups: 8                 # group-limited routing (was 4)
  n_limited_groups: 3                # top-3 groups per token (was 2)
  group_topk: 2                      # 2 best experts per selected group
  route_scale: 1.0
  bias_upper_threshold: 0.10
  bias_lower_threshold: 0.10
  moe_activation: swiglu             # swiglu (default), relu2 (legacy)

  # ── GDN (Qwen3-Next) layer config — Phase 2.2 default ───────────────
  ssm_type: "gdn"                    # "gdn" (default) or "mamba2" (legacy)
  gdn_d_state: 128
  gdn_d_conv: 4
  gdn_headdim: 64

  # ── Mamba-2 (legacy opt-in) ─────────────────────────────────────────
  mamba_d_state: 128
  mamba_d_conv: 4
  mamba_headdim: 64

  # ── MTP (multi-token prediction) — Phase 2.4 ────────────────────────
  mtp_depth: 3                       # (was 2)
  mtp_loss_weight: 0.30
  mtp_loss_weight_schedule: [0.3, 0.2, 0.1]
  mtp_softcap: true
  mtp_softcap_value: 15.0

  # ── μP (Phase 2.5) ─────────────────────────────────────────────────
  muP: true

  # ── Logit softcap + asymmetric rescale (Phase 2.6) ───────────────
  logit_softcap: 15.0
  asymmetric_rescale: false          # opt-in

  # ── MoLE (Phase 2.3) ──────────────────────────────────────────────
  mole_every_n: 0                    # 0 = disabled; 4 = every 4th FFN slot
  mole_rank: 32
  mole_n_experts: 8
  mole_top_k: 1

  # ── Embed / head ──────────────────────────────────────────────────────
  tie_embeddings: true
  no_bias_linear: true               # no bias in any linear (except MoE gate)

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  shard_manifest_path: data/shards/manifest.jsonl
  # Legacy flat-file paths (used only when shard_manifest_path is absent)
  # train_data_path: data/pretrain_data.bin
  # val_data_path: data/validation_data.bin
  # SmolLM2-style multi-stage data mix (Q2 milestone):
  #   FineWeb-Edu (web, 60 %) + FineMath (math, 15 %) +
  #   Stack-Edu (code, 15 %) + Cosmopedia (synthetic instr, 5 %) +
  #   OpenR1-Math-220k (reasoning, 5 %)
  data_mix:
    fineweb_edu: 0.60
    finemath: 0.15
    stack_edu: 0.15
    cosmopedia: 0.05
    openr1_math: 0.05
